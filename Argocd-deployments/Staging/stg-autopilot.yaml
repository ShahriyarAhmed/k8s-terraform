apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    app: stg-autopilot
  name: stg-autopilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stg-autopilot
  strategy: {}
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: stg-autopilot
    spec:
      containers:
      - image: europe-west1-docker.pkg.dev/qureos-mig-gke/qureos-stg-repo/autopilot:17236885220
        name: stg-autopilot
        resources: {}
        livenessProbe:
          httpGet:
            path: /healthcheck
            port: 8900
          initialDelaySeconds: 90
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthcheck
            port: 8900
          initialDelaySeconds: 90
          periodSeconds: 5
status: {}