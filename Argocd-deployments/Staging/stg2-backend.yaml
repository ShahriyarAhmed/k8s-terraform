apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    app: stg2-backend
  name: stg2-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stg2-backend
  strategy: {}
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: stg2-backend
    spec:
      containers:
      - image: europe-west1-docker.pkg.dev/qureos-mig-gke/qureos-stg-repo/stg2-backend:16597312916
        name: stg2-backend
        resources: {}
        livenessProbe:
          httpGet:
            path: /healthcheck
            port: 4003
          initialDelaySeconds: 90
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /healthcheck
            port: 4003
          initialDelaySeconds: 90
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 5
status: {}