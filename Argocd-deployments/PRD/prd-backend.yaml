apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    app: prd-backend
  name: prd-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prd-backend
  strategy: {}
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: prd-backend
    spec:
      containers:
      - image: europe-west1-docker.pkg.dev/qureos-mig-gke/qureos-prod-repo/prd-backend:14444700937
        name: prd-backend
        resources:
          requests:
            cpu: "1000m"
            memory: "700Mi"
        livenessProbe:
          httpGet:
            path: /healthcheck
            port: 4003
          initialDelaySeconds: 90
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthcheck
            port: 4003
          initialDelaySeconds: 90
          periodSeconds: 5
status: {}